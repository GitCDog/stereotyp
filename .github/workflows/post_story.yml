name: Stereotypen – Täglicher Instagram Post

on:
  schedule:
    # Täglich 18:30 CEST (16:30 UTC)
    # Zufällige Pause deaktiviert – postet pünktlich um 18:30
    # - cron-sleep: SECS=$(( RANDOM % 3601 )); sleep $SECS
    - cron: "30 16 * * *"
  workflow_dispatch:
    inputs:
      story_nr:
        description: "Story-Nummer (leer = nächste ausstehende)"
        required: false
        default: ""

jobs:
  post-story:
    runs-on: ubuntu-latest
    environment: stereotyp
    permissions:
      contents: write
    defaults:
      run:
        working-directory: 1_orchestrator

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Dependencies installieren
        run: pip install -r requirements.txt

      - name: Auf Instagram posten
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_RECIPIENT_ID: ${{ secrets.INSTAGRAM_RECIPIENT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          STORY_NR: ${{ inputs.story_nr }}
        run: python instagram_poster.py

      - name: Dashboard aktualisieren
        run: |
          python sync_status.py
          python generate_dashboard.py

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 1_orchestrator/1_input/1_input_file.txt \
                  1_orchestrator/dashboard.html \
                  1_orchestrator/posted_videos.json || true
          git diff --staged --quiet || git commit -m "[AUTO] Instagram Post – $(date +'%Y-%m-%d')"
          git push || true

      - name: Cloudinary Video-Vorrat prüfen
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(python3 - <<'EOF'
          import cloudinary, cloudinary.api, os
          cloudinary.config(
              cloud_name=os.getenv("CLOUDINARY_CLOUD_NAME"),
              api_key=os.getenv("CLOUDINARY_API_KEY"),
              api_secret=os.getenv("CLOUDINARY_API_SECRET"),
              secure=True,
          )
          r = cloudinary.api.resources(type="upload", resource_type="video", prefix="stereotypen/", max_results=50)
          print(len(r.get("resources", [])))
          EOF
          )
          echo "Videos auf Cloudinary: $COUNT"
          if [ "$COUNT" -le 2 ]; then
            gh issue create \
              --title "⚠️ Nur noch $COUNT Video(s) auf Cloudinary – neue Videos generieren!" \
              --body "Nach dem heutigen automatischen Post sind nur noch **$COUNT Video(s)** auf Cloudinary verfügbar. Bitte neue Videos generieren und hochladen, damit die täglichen Posts weiterlaufen." \
              --repo ${{ github.repository }} || true
          fi
